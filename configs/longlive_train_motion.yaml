# Motion-DMD: extends longlive_train_long.yaml with a `motion:` block that
# routes the DMD generator update through `_compute_kl_grad_with_motion`.
# Set `motion.enabled = false` to fall back to vanilla DMD (a single switch
# of behavior, no other changes needed).

# NVlabs's released LongLive 1.3B Stage-2 ckpt; path expands $LL_DATA at load
# time. We continue-train this (generator is trainable, not frozen) with the
# motion-DMD score correction injected, rather than redo Stage 1+2 from
# scratch (would add ~5 weeks of distillation we already have for free).
generator_ckpt: $LL_DATA/longlive_models/models/longlive_base.pt
generator_fsdp_wrap_strategy: size
real_score_fsdp_wrap_strategy: size
fake_score_fsdp_wrap_strategy: size
real_name: Wan2.1-T2V-14B  # rank-1 uses meta-init; FSDP broadcasts from rank 0
fake_name: Wan2.1-T2V-1.3B
text_encoder_fsdp_wrap_strategy: size
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
ts_schedule: false
num_train_timestep: 1000
timestep_shift: 5.0
guidance_scale: 3.0
denoising_loss_type: flow
mixed_precision: true
seed: 0
wandb_key: YOUR_WANDB_KEY
wandb_entity: hongyou
wandb_project: longlive_motion
sharding_strategy: hybrid_full
lr: 1.0e-05
lr_critic: 2.0e-06
beta1: 0.0
beta2: 0.999
beta1_critic: 0.0
beta2_critic: 0.999
data_path: prompts/vidprom_filtered_extended.txt
switch_prompt_path: prompts/vidprom_filtered_extended_switch.txt
batch_size: 1
gradient_accumulation_steps: 1
ema_weight: 0.99
ema_start_step: 200
total_batch_size: 64
log_iters: 50
max_checkpoints: 3
max_iters: 3000

negative_prompt: '色调艳丽，过曝，静态，细节模糊不清，字幕，风格，作品，画作，画面，静止，整体发灰，最差质量，低质量，JPEG压缩残留，丑陋的，残缺的，多余的手指，画得不好的手部，画得不好的脸部，畸形的，毁容的，形态畸形的肢体，手指融合，静止不动的画面，杂乱的背景，三条腿，背景人很多，倒着走'
dfake_gen_update_ratio: 5
image_or_video_shape:
- 1
- 240
- 16
- 60
- 104
distribution_loss: dmd_switch
global_sink: false
trainer: score_distillation
gradient_checkpointing: true
num_frame_per_block: 3
load_raw_video: false
model_kwargs:
  timestep_shift: 5.0
  local_attn_size: 12
  sink_size: 3

# Visualization
# Use a curated motion-test prompt set so vis videos exercise the cross-form
# human walking case (different ages, builds, scenes) instead of whatever
# happens to be the first batch of vidprom (e.g. "Kenyan golfers", which
# does not exercise walking-class motion).
vis_interval: 500
vis_ema: false
vis_video_lengths:
- 240
val_batch_size: 4                                  # 4 videos per vis attempt (was 1)
val_data_path: prompts/motion_vis_prompts.txt
val_switch_prompt_path: prompts/motion_vis_prompts_switch.txt

slice_last_frames: 21

switch_mode: random_choice
switch_choices:
- 21
- 39
- 57
- 75
- 93
- 111
- 129
- 147
- 165
- 183
- 201

streaming_training: true
streaming_chunk_size: 21
streaming_max_length: 240

streaming_min_new_frame: 18
train_first_chunk: true

last_step_only: false

## LoRA Configuration
adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  apply_to_critic: true
  verbose: true

## Motion-DMD configuration -------------------------------------------------
# When `enabled: true`, each generator step (where the schedule yields β > 0)
# replaces the vanilla teacher score with `(1-β)·v_real + β·v_real_motion`,
# where v_real_motion is the 14B teacher run with V_ref attention injected
# at `block_idxs`. See `model/dmd.py:_compute_kl_grad_with_motion`.
#
# v2: replaced v1's Bernoulli `inject_prob` mixture with a deterministic β
# schedule. `β=0` steps automatically skip the motion path → vanilla DMD,
# so "vanilla coverage" is encoded directly in the schedule, no RNG bias.
motion:
  enabled: true
  # Path to the V_ref latent cache produced by
  # `scripts/motion_dmd/precache_motion_refs.py`. $LL_DATA / ~ are expanded.
  refs_path: $LL_DATA/motion_dmd/walking_v1.latents.pt
  # Which 14B-teacher self_attn blocks receive injection. 14B has 40 blocks;
  # mid-third (18..20) targets motion-binding semantics without disturbing
  # the late reconstruction-head residuals.
  block_idxs: [18, 19, 20]
  # Hook-blend weight α ∈ [0,1]: out = (1-α)·orig + α·V_ref. 0.5 is the
  # MotionMatcher prescription; lower for weaker motion bias.
  alpha: 0.5

  # β schedule. Choices:
  #   "constant"      — β = beta_max for every step.
  #   "linear_warmup" — linear ramp beta_warmup_start → beta_max over
  #                     beta_warmup_steps, then hold at beta_max.
  #   "warmup_cyclic" — warmup then cycles between beta_max and 0 in periods
  #                     of `cyclic_period` steps; first cyclic_high_ratio
  #                     of each cycle at beta_max, rest at 0 (= deterministic
  #                     analog of v1's Bernoulli mixture).
  beta_schedule: linear_warmup
  beta_max: 0.15           # constant β value steady-state (pick lower than v1's
                           # 0.2: v2 has β active 100% of post-warmup steps,
                           # so per-step contribution is the same as v1's
                           # 0.7×0.2 = 0.14 average effective signal)
  beta_warmup_start: 0.0
  beta_warmup_steps: 200
  # Only used when beta_schedule="warmup_cyclic".
  cyclic_period: 10
  cyclic_high_ratio: 0.7
