# VBench short (Table 1) inference config.
#
# Identical to longlive_inference.yaml except num_output_frames=21
# (=81 pixel frames @ 16 fps = 5.06s, matching the paper's Table 1
# protocol). data_path / output_folder / generator_ckpt / lora_ckpt
# are overridden by scripts/vbench/eval_dispatch.py at run time.
denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_frame_per_block: 3
model_name: Wan2.1-T2V-1.3B
model_kwargs:
  local_attn_size: 12
  timestep_shift: 5.0
  sink_size: 3

# inference defaults; dispatcher overrides per-run paths
data_path: longlive_models/prompts/vidprom_filtered_extended.txt
output_folder: vbench_runs/_unset
inference_iter: -1
num_output_frames: 21          # 81 pixel frames @ 16 fps = 5.06s (Table 1)
use_ema: false
seed: 0
num_samples: 1
save_with_index: true
global_sink: true
context_noise: 0

generator_ckpt: longlive_models/models/longlive_base.pt
lora_ckpt: longlive_models/models/lora.pt

adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false
