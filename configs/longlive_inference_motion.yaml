generator_ckpt: checkpoints/longlive_init.pt
# Point to the LoRA+motion_encoder checkpoint written by training
lora_ckpt: null  # e.g. logs/checkpoint_model_000500/model.pt

real_name: Wan2.1-T2V-1.3B
fake_name: Wan2.1-T2V-1.3B

denoising_step_list:
- 1000
- 750
- 500
- 250
warp_denoising_step: true
num_train_timestep: 1000
timestep_shift: 5.0
seed: 0
mixed_precision: true
distributed: false

num_frame_per_block: 3
context_noise: 0
model_kwargs:
  timestep_shift: 5.0
  local_attn_size: 12
  sink_size: 3

motion_encoder:
  enabled: true
  dim: 4096
  num_layers: 4
  num_heads: 16
  tokens_per_frame: 64
  max_tokens: 512
  ref_length: 16
  image_size: [480, 832]

adapter:
  type: "lora"
  rank: 256
  alpha: 256
  dropout: 0.0
  dtype: "bfloat16"
  verbose: false

output_folder: outputs_motion
num_samples: 1
num_output_frames: 81
use_ema: false
